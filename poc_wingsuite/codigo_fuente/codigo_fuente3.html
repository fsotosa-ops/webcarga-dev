<script>
    var id_aplicacion = 5;

    $(function () {
        if('serviceWorker' in navigator){
            let urlSw = `${window.localStorage.URL_CORE}sw.js`;
            window.addEventListener('load', function() {
                navigator.serviceWorker
                    .register(urlSw)
                    .then((result) => {
                        //console.log("Service Worker Registered");
                    }).catch((err) => {
                        console.log('error en SW ->', err);
                    });
            });
        }

        check_last_version('fenix');
        check_s_locale();
                var avisos = obtener_avisos();
        if(avisos.length > 0){
            localStorage.setItem('AVISOS_MODULO',JSON.stringify(avisos));
            funcionesTema.mostrarBienvenida();
        }
        if(id_aplicacion == 3 || id_aplicacion == 8) {
            if(localStorage.USUARIO_TIPO != 0){
                obtener_gpss();
            } else {
                obtener_vacio_gpss();
                funcionesTema.cargarPaginaBd(5,4134, '[]');
            }
        } else {
            funcionesTema.cargarPaginaBd(5,4134, '[]');
        }
        
    });

    function obtener_avisos(){
        var avisos_mostrar  = [];
        var avisos_actuales = [];

        try {
            avisos_actuales = JSON.parse(localStorage.AVISOS);
        } catch (error) {
            console.error(error);
        }

        for(i in avisos_actuales){
            var aviso = avisos_actuales[i];
            var aplicaciones = aviso.APLICACIONES.split(',');
            var id_producto  = aviso.ID_PRODUCTO;
            if(id_producto == 0){
                if(!avisos_mostrar.some(k => k['ID'] === aviso.ID)){
                    avisos_mostrar.push(aviso);
                }
            } else {
                if(aplicaciones.includes(id_aplicacion.toString())){
                    if(!avisos_mostrar.some(k => k['ID'] === aviso.ID)){
                        avisos_mostrar.push(aviso);
                    }
                }
            }
        }
        return avisos_mostrar;
    }

    async function obtener_gpss(){
        funcionesTema.blockGlobal(true,'Cargando datos en memoria, por favor espere...');
        var orgs = [];
        if(!localStorage.hasOwnProperty('ORGS_GPSS_PRECARGADOS')){
            orgs = await obtener_get_tx({"id_empresa" : localStorage.ID_EMPRESA, "usuario" : localStorage.USUARIO}, `${localStorage.API_GPSS}/organizacion.obtener/4.0.1`);
            localStorage.setItem('ORGS_GPSS_PRECARGADOS', JSON.stringify(orgs));
        } else{
            if(JSON.parse(localStorage.ORGS_GPSS_PRECARGADOS).length == 0){
                orgs = await obtener_get_tx({"id_empresa" : localStorage.ID_EMPRESA, "usuario" : localStorage.USUARIO}, `${localStorage.API_GPSS}/organizacion.obtener/4.0.1`);
                localStorage.setItem('ORGS_GPSS_PRECARGADOS', JSON.stringify(orgs));
            } else {
                orgs = JSON.parse(localStorage.ORGS_GPSS_PRECARGADOS)
            }
        }

        if(!localStorage.hasOwnProperty('ES_GPSS_PRECARGADOS')){
            var empresas = await obtener_get_tx({"id_empresa" : localStorage.ID_EMPRESA, "usuario" : localStorage.USUARIO}, `${localStorage.API_GPSS}/web.empresa.precargar_prestamos_servicios/4.0.0`);
            localStorage.setItem('ES_GPSS_PRECARGADOS', JSON.stringify(empresas));
        } else {
            if(JSON.parse(localStorage.ES_GPSS_PRECARGADOS).length == 0){
                var empresas = await obtener_get_tx({"id_empresa" : localStorage.ID_EMPRESA, "usuario" : localStorage.USUARIO}, `${localStorage.API_GPSS}/web.empresa.precargar_prestamos_servicios/4.0.0`);
                localStorage.setItem('ES_GPSS_PRECARGADOS', JSON.stringify(empresas));
            } else {
                var empresas = JSON.parse(localStorage.ES_GPSS_PRECARGADOS);
                localStorage.setItem('ES_GPSS_PRECARGADOS', JSON.stringify(empresas));
            }
        }

        if(!localStorage.hasOwnProperty('TIPO_MOVILES_GPSS_PRECARGADOS')){
            var tm = await obtener_get_tx({"id_empresa" : localStorage.ID_EMPRESA}, `${localStorage.API_GPSS}/tipo_movil.obtener/2.0.0`);
            localStorage.setItem('TIPO_MOVILES_GPSS_PRECARGADOS', JSON.stringify(tm));
        } else {
            if(JSON.parse(localStorage.TIPO_MOVILES_GPSS_PRECARGADOS).length == 0){
                var tm = await obtener_get_tx({"id_empresa" : localStorage.ID_EMPRESA}, `${localStorage.API_GPSS}/tipo_movil.obtener/2.0.0`);
                localStorage.setItem('TIPO_MOVILES_GPSS_PRECARGADOS', JSON.stringify(tm));
            } else {
                var tm = JSON.parse(localStorage.TIPO_MOVILES_GPSS_PRECARGADOS);
                localStorage.setItem('TIPO_MOVILES_GPSS_PRECARGADOS', JSON.stringify(tm));
            }
        }

        if(!localStorage.hasOwnProperty('MOVILES_GPSS_PRECARGADOS')){
            var movs = await obtener_get_tx({"id_empresa" : localStorage.ID_EMPRESA, "usuario" : localStorage.USUARIO}, `${localStorage.API_GPSS}/web.empresa.precargar_moviles_usuario/4.0.0`);
            localStorage.setItem('MOVILES_GPSS_PRECARGADOS', JSON.stringify(movs));
        } else{
            if(JSON.parse(localStorage.MOVILES_GPSS_PRECARGADOS).length == 0){
                var movs = await obtener_get_tx({"id_empresa" : localStorage.ID_EMPRESA, "usuario" : localStorage.USUARIO}, `${localStorage.API_GPSS}/web.empresa.precargar_moviles_usuario/4.0.0`);
                localStorage.setItem('MOVILES_GPSS_PRECARGADOS', JSON.stringify(movs));
            } else {
                var movs = JSON.parse(localStorage.MOVILES_GPSS_PRECARGADOS)
            }
        }
        funcionesTema.blockGlobal(false);
        funcionesTema.cargarPaginaBd(5,4134, '[]');
    }

    function obtener_vacio_gpss(){
        localStorage.setItem('ORGS_GPSS_PRECARGADOS', '[]');
        localStorage.setItem('ES_GPSS_PRECARGADOS', '[]');
        localStorage.setItem('TIPO_MOVILES_GPSS_PRECARGADOS', '[]');
        localStorage.setItem('MOVILES_GPSS_PRECARGADOS', '[]');
    }

    async function obtener_get_tx(param, url){
        try {
            let data  = await tx.request({url : url ,method : "GET", params : param});
            return (data.response.resp != null) ? data.response.resp : [];
        } catch (error) {
            console.error(error)
            return []
        }
    }

    async function obtener_post_tx(param, url){
        var config = {
            url: url,
            method: 'POST',
            body: param
        }
        try {
            var data = await tx.request(config)
            var resp = (data.response.resp != null) ? data.response.resp : [];
            return resp
        } catch (error) {
            console.error(error)
            return [];
        }
    }
