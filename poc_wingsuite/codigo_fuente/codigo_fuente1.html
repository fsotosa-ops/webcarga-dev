    <script>
        var error = "";
        var msg = "";
        var noCaptcha = "1";
        var mobile = 0;
        grecaptcha.ready(function() {
            grecaptcha.execute('6Ldj9MIUAAAAAEuP55OfOKReEw5gFzurnYO2rUiP', {action: 'homepage'});
        });

        $(function () {
            if (error == "warning" || error == "danger" || error == "success") {
                Swal.fire({
                    text: msg,
                    type: "warning"
                });
            }
            const formRecuperar = document.getElementById('recuperaForm');
            formRecuperar.addEventListener('submit', function (event) {
                event.preventDefault();
                olvidoPass();
            });
            window.localStorage.clear();
        });

        function olvidoPass() {
            const usuario = document.getElementById('username_recupera').value;
            const formRecuperar = document.getElementById('recuperaForm');

            $.post("core/mod_admin/ajax/index_ajax.php",{
                accion  : "recuperar_password",
                usuario : usuario.toUpperCase()
            }, function (data) {
                $('#modalRecuperacion').modal('hide');
                Swal.fire({
                    text: data.msg,
                    type: data.status
                });
            }, 'json');
            formRecuperar.reset();
        }

    </script>
